# Minimal Hyprland session used only as the greetd greeter compositor.
# Keep this independent from the user session config so login stays recoverable.

monitor = eDP-1, preferred, auto, 1.666667
monitor = , preferred, auto, 1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

exec-once = swaybg -i /usr/local/share/asahi-hyprland/login-wallpaper.jpg -m fill
exec-once = sh -lc '/usr/local/bin/hypr-greeter-app; sleep 0.20; hyprctl dispatch exit'

input {
    kb_layout = us
    kb_variant =
    kb_model = applealu_ansi
    kb_options = caps:super,terminate:ctrl_alt_bksp
    follow_mouse = 0
    repeat_rate = 40
    repeat_delay = 250

    touchpad {
        natural_scroll = true
        tap-to-click = false
        clickfinger_behavior = true
        disable_while_typing = true
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(ffffff00)
    col.inactive_border = rgba(ffffff00)
    layout = dwindle
}

decoration {
    rounding = 30

    shadow {
        enabled = true
        range = 28
        render_power = 4
        color = rgba(03071288)
        color_inactive = rgba(03071288)
    }

    blur {
        enabled = true
        size = 12
        passes = 6
        special = true
        popups = true
        xray = true
        brightness = 1.08
        contrast = 1.03
        vibrancy = 0.58
        vibrancy_darkness = 0.18
        noise = 0.010
    }
}

animations {
    enabled = true
    bezier = glass, 0.22, 1, 0.36, 1
    animation = windows, 1, 4, glass, popin 92%
    animation = fade, 1, 3, glass
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
}

cursor {
    hide_on_key_press = true
}

windowrule = float true, match:class ^(hypr-greeter)$
windowrule = center true, match:class ^(hypr-greeter)$
windowrule = size 620 430, match:class ^(hypr-greeter)$
windowrule = opacity 0.98 override 0.98 override, match:class ^(hypr-greeter)$

bind = CTRL ALT, BACKSPACE, exit
bind = CTRL ALT, DELETE, exec, systemctl reboot
