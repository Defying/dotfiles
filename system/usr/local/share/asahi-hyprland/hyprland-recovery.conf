# Minimal recovery-oriented Hyprland config for Fedora Asahi.
# This extends the root-owned safe config and opens a recovery terminal.

source = /usr/local/share/asahi-hyprland/hyprland-safe.conf

env = ASAHI_HYPRLAND_RECOVERY,1

exec-once = sleep 1 && /home/ben/.local/bin/hypr-first-login-terminal --force
