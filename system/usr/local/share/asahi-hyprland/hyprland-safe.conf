# Minimal recovery-oriented Hyprland config for Fedora Asahi.
# This file intentionally avoids exec-once autostart entries.

$mainMod = SUPER
$terminal = ghostty
$menu = fuzzel --show drun

monitor = , preferred, auto, 1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

input {
    kb_layout = us
    kb_variant =
    kb_model = applealu_ansi
    kb_options = ctrl:nocaps,terminate:ctrl_alt_bksp
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 40
    repeat_delay = 250
    numlock_by_default = true

    touchpad {
        natural_scroll = true
        tap-to-click = true
        clickfinger_behavior = true
        scroll_factor = 0.35
        disable_while_typing = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
}

# Core escape and launch bindings.
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, W, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, T, togglefloating
bind = $mainMod, J, layoutmsg, togglesplit

# Mac-style editing helpers.
bind = $mainMod, C, sendshortcut, CTRL, INSERT, activewindow
bind = $mainMod, V, sendshortcut, SHIFT, INSERT, activewindow
bind = $mainMod, X, sendshortcut, CTRL, X, activewindow
bind = $mainMod, A, sendshortcut, CTRL, A, activewindow
bind = $mainMod, Z, sendshortcut, CTRL, Z, activewindow
bind = $mainMod SHIFT, C, sendshortcut, CTRL SHIFT, C, activewindow
bind = $mainMod SHIFT, V, sendshortcut, CTRL SHIFT, V, activewindow

# Focus, move, resize.
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

binde = $mainMod ALT, left, resizeactive, -60 0
binde = $mainMod ALT, right, resizeactive, 60 0
binde = $mainMod ALT, up, resizeactive, 0 -60
binde = $mainMod ALT, down, resizeactive, 0 60

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod CTRL, TAB, workspace, previous
bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev

# Hardware keys only; no daemon autostart is required.
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
