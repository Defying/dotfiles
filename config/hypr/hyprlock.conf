general {
    fail_timeout = 0
    ignore_empty_input = true
}

background {
    monitor =
    path = /usr/share/hypr/wall0.png
    blur_passes = 2
    blur_size = 4
    brightness = 0.55
}

label {
    monitor =
    text = $TIME
    color = rgba(ffffffee)
    font_size = 72
    font_family = SF Pro Display
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd + return opens Ghostty
    color = rgba(cad3f5cc)
    font_size = 14
    font_family = SF Pro Text
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.25
    outer_color = rgba(33ccffee)
    inner_color = rgba(11151cee)
    font_color = rgba(ffffffee)
    fade_on_empty = false
    placeholder_text = <span foreground="##cad3f5">Password</span>
    fail_text = <span foreground="##ff6b6b">Try again</span>
    font_family = SF Pro Text
    position = 0, -70
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] /home/ben/dotfiles/scripts/hyprlock-battery-status.sh
    color = rgba(cad3f5cc)
    font_size = 13
    font_family = SF Pro Text
    position = 0, -135
    halign = center
    valign = center
}
