# Idle/lock screen, styled to match the greetd greeter's glass card
# (system/usr/local/bin/hypr-greeter-app): same wallpaper, SF Pro fonts, frosted
# card, cyan (#33ccff) focus + purple (#c084f5) accents.

background {
    monitor =
    path = /usr/local/share/asahi-hyprland/login-wallpaper.jpg
    blur_passes = 3
    blur_size = 6
    brightness = 0.50
    vibrancy = 0.20
}

# Frosted glass card behind the clock + input (the greeter's #card).
shape {
    monitor =
    size = 460, 360
    color = rgba(0a0e1857)
    rounding = 30
    border_size = 1
    border_color = rgba(ffffff6b)
    position = 0, 0
    halign = center
    valign = center
}

# Big clock.
label {
    monitor =
    text = $TIME
    color = rgba(f8fafcf5)
    font_size = 64
    font_family = SF Pro Display
    position = 0, 96
    halign = center
    valign = center
}

# Date.
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %-d"
    color = rgba(cad3f5b0)
    font_size = 15
    font_family = SF Pro Text
    position = 0, 36
    halign = center
    valign = center
}

# Greeting.
label {
    monitor =
    text = Welcome back, $USER
    color = rgba(f8fafcf0)
    font_size = 20
    font_family = SF Pro Display
    position = 0, -8
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(33ccffe0)
    inner_color = rgba(060a1257)
    font_color = rgba(fffffff5)
    fade_on_empty = false
    rounding = 16
    placeholder_text = <span foreground="##cad3f5">Password</span>
    fail_text = <span foreground="##ff6b6b">Try again ($ATTEMPTS)</span>
    check_color = rgba(c084f5ee)
    fail_color = rgba(ff6b6bee)
    font_family = SF Pro Text
    position = 0, -78
    halign = center
    valign = center
}
