# Fedora Asahi Hyprland config, inspired by Omarchy defaults.
# Keep Plasma installed and select Hyprland from the login screen while testing.

$mainMod = SUPER
$terminal = /usr/bin/ghostty
$menu = python3 /home/ben/dotfiles/scripts/liquid-launcher.py
$fileManager = dolphin
$wallpaper = /usr/share/hypr/wall0.png

monitor = eDP-1, preferred, auto, 1.666667
monitor = , preferred, auto, 1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start hyprland-session.target
exec-once = sh -lc 'sleep 2; systemctl --user reset-failed xdg-desktop-portal-hyprland.service xdg-desktop-portal.service mako.service 2>/dev/null || true; systemctl --user restart xdg-desktop-portal-hyprland.service xdg-desktop-portal-gtk.service xdg-desktop-portal.service'
exec-shutdown = systemctl --user stop hyprland-session.target
exec-once = hyprpaper
exec-once = waybar
exec-once = /home/ben/dotfiles/scripts/hypr-trackpad-gestures.py
exec-once = mako
# Mako already gets layer blur below; do not apply the global liquid-glass
# screen shader over notifications because it distorts notification content.
exec-once = sleep 2 && /home/ben/.local/bin/hypr-first-login-notice
exec-once = sleep 3 && /home/ben/.local/bin/hypr-first-login-terminal
exec-once = sleep 8 && /home/ben/.local/bin/hypr-session-autocheck
exec-once = hypridle
exec-once = /usr/libexec/hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

input {
    kb_layout = us
    kb_variant =
    kb_model = applealu_ansi
    kb_options = caps:super,terminate:ctrl_alt_bksp
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 40
    repeat_delay = 250
    numlock_by_default = true

    touchpad {
        natural_scroll = true
        tap-to-click = false
        clickfinger_behavior = true
        scroll_factor = 0.35
        disable_while_typing = true
    }
}

general {
    gaps_in = 7
    gaps_out = 8,28,28,28
    border_size = 1
    col.active_border = rgba(c084f5dd)
    col.inactive_border = rgba(ffffff24)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 28
    screen_shader = /home/ben/dotfiles/config/hypr/shaders/rounded-corners.frag

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 8
        passes = 5
        special = true
        popups = true
        xray = true
        brightness = 0.95
        contrast = 0.95
        vibrancy = 0.50
        vibrancy_darkness = 0.30
        noise = 0.012
    }
}

windowrule = no_shadow on, match:class ^(com\.mitchellh\.ghostty)$

layerrule = blur true, match:namespace ^waybar$
layerrule = blur true, match:namespace ^notifications$
layerrule = blur true, match:namespace ^liquid-osd$
layerrule = blur true, match:namespace ^launcher$
layerrule = blur true, match:namespace ^weather-popup$
layerrule = blur true, match:namespace ^quick-settings$
# ignore_alpha skips blurring under fully-transparent pixels — for waybar that
# means only the bubble shapes (which have a translucent fill) get blurred
# behind them, not the empty gaps between them.
layerrule = match:namespace waybar, ignore_alpha 0.10
layerrule = match:namespace notifications, ignore_alpha 0.01
layerrule = match:namespace liquid-osd, ignore_alpha 0.01
layerrule = match:namespace launcher, ignore_alpha 0.01
layerrule = match:namespace weather-popup, ignore_alpha 0.01
layerrule = match:namespace quick-settings, ignore_alpha 0.01

group {
    col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.border_inactive = rgba(595959aa)

    groupbar {
        font_size = 12
        font_family = SF Mono
        font_weight_active = ultraheavy
        font_weight_inactive = normal
        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0
        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)
        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 3.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
}

dwindle {
    preserve_split = true
    force_split = 2
}

scrolling {
    column_width = 0.49
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
}

# MacBook-first app and session commands.
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod ALT, SPACE, exec, /home/ben/.local/bin/hypr-menu
bind = $mainMod, K, exec, /home/ben/.local/bin/hypr-keybindings
bind = $mainMod, RETURN, exec, $terminal
bind = CTRL ALT, T, exec, $terminal
bind = CTRL ALT, RETURN, exec, $terminal
bind = ALT, RETURN, exec, $terminal
bind = , F12, exec, $terminal
bind = CTRL ALT, SPACE, exec, /home/ben/.local/bin/hypr-menu
bind = CTRL ALT, K, exec, /home/ben/.local/bin/hypr-keybindings
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, killactive
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = CTRL ALT, Q, exit
bind = CTRL ALT, BACKSPACE, exit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod CTRL, F, fullscreenstate, 0 2
bind = $mainMod ALT, F, fullscreen, 1
bind = $mainMod, T, togglefloating
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, P, pseudo

# Mac-style editing helpers. Ctrl+Insert and Shift+Insert avoid terminal Ctrl+C.
bind = $mainMod, C, exec, /home/ben/.local/bin/hypr-mac-shortcut copy
bind = $mainMod, V, exec, /home/ben/.local/bin/hypr-mac-shortcut paste
bind = $mainMod, X, sendshortcut, CTRL, X, activewindow
bind = $mainMod, A, sendshortcut, CTRL, A, activewindow
bind = $mainMod, Z, sendshortcut, CTRL, Z, activewindow
bind = $mainMod SHIFT, C, sendshortcut, CTRL SHIFT, C, activewindow
bind = $mainMod SHIFT, V, sendshortcut, CTRL SHIFT, V, activewindow

# Focus, move, resize.
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

binde = $mainMod ALT, left, resizeactive, -60 0
binde = $mainMod ALT, right, resizeactive, 60 0
binde = $mainMod ALT, up, resizeactive, 0 -60
binde = $mainMod ALT, down, resizeactive, 0 60

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces: Cmd+number switches; Cmd+Ctrl+number moves the window.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

bind = $mainMod CTRL ALT, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL ALT, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL ALT, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL ALT, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL ALT, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL ALT, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL ALT, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL ALT, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL ALT, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL ALT, 0, movetoworkspacesilent, 10

bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod CTRL, TAB, workspace, previous
bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev

bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod ALT, S, movetoworkspacesilent, special:scratchpad

# Utilities.
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, SLASH, exec, /home/ben/.local/bin/hypr-doctor
bind = $mainMod, ESCAPE, exec, /home/ben/.local/bin/hypr-power-menu
bind = $mainMod SHIFT, 3, exec, /home/ben/.local/bin/hypr-screenshot full
bind = $mainMod SHIFT, 4, exec, /home/ben/.local/bin/hypr-screenshot region
bind = $mainMod SHIFT, 5, exec, /home/ben/.local/bin/hypr-screenshot edit
bind = $mainMod CTRL, V, exec, /home/ben/.local/bin/hypr-clipboard-menu
bind = $mainMod, COMMA, exec, makoctl dismiss
bind = $mainMod SHIFT, COMMA, exec, makoctl dismiss --all
bind = $mainMod CTRL, A, exec, pavucontrol
bind = $mainMod CTRL, W, exec, nm-connection-editor
bind = $mainMod SHIFT, A, exec, $HOME/.local/bin/aerial toggle

# MacBook function/media keys.
binde = , XF86AudioRaiseVolume, exec, /home/ben/dotfiles/scripts/volume-osd.sh up
binde = , XF86AudioLowerVolume, exec, /home/ben/dotfiles/scripts/volume-osd.sh down
bind  = , XF86AudioMute,        exec, /home/ben/dotfiles/scripts/volume-osd.sh mute
bind  = , XF86AudioMicMute,     exec, /home/ben/dotfiles/scripts/volume-osd.sh micmute
binde = , XF86MonBrightnessUp,   exec, /home/ben/dotfiles/scripts/volume-osd.sh bright-up
binde = , XF86MonBrightnessDown, exec, /home/ben/dotfiles/scripts/volume-osd.sh bright-down
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Additional window/layer rules can go here after they are tested live.

# imessage-linux: float as a proper messaging window at a fixed size.
# (rules removed pending Hyprland 0.55 syntax migration — re-add when imessage-linux is in use.)
