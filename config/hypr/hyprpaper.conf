# NOTE: hyprpaper is NOT the active wallpaper provider on this machine. Its
# newer hyprtoolkit/dmabuf build cannot create a wallpaper surface on the M1's
# Asahi GPU pipeline ("Monitor … has no target"), so it renders nothing here.
# The session uses swaybg instead (see hyprland.conf). This config is kept with
# correct directive syntax in case GPU support lands or hyprpaper is used on
# other hardware; the previous `wallpaper { path = ... }` block was never valid
# hyprpaper config and silently loaded nothing.
preload = /home/ben/dotfiles/assets/wallpaper-marek-piwnicki.jpg
wallpaper = , /home/ben/dotfiles/assets/wallpaper-marek-piwnicki.jpg

splash = false
ipc = on
