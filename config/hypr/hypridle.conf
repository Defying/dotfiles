general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on; pkill -RTMIN+8 waybar; pkill -RTMIN+9 waybar
}

listener {
    timeout = 300
    on-timeout = /home/ben/.local/bin/hypr-on-battery /home/ben/dotfiles/scripts/hypr-brightness-fade.sh dim 10 1.6
    on-resume = /home/ben/dotfiles/scripts/hypr-brightness-fade.sh restore 1.0
}

listener {
    timeout = 600
    on-timeout = /home/ben/.local/bin/hypr-on-battery loginctl lock-session
}

listener {
    timeout = 900
    on-timeout = /home/ben/.local/bin/hypr-on-battery hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
