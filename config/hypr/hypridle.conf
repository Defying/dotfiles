general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = /home/ben/.local/bin/hypr-on-battery brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 600
    on-timeout = /home/ben/.local/bin/hypr-on-battery loginctl lock-session
}

listener {
    timeout = 900
    on-timeout = /home/ben/.local/bin/hypr-on-battery hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
