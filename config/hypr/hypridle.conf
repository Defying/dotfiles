general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on; pkill -RTMIN+8 waybar; pkill -RTMIN+9 waybar
}

listener {
    timeout = 300
    on-timeout = /home/ben/.local/bin/hypr-on-battery /home/ben/dotfiles/scripts/hypr-brightness-fade.sh dim 10 1.6
    on-resume = /home/ben/dotfiles/scripts/hypr-brightness-fade.sh restore 1.0
}

listener {
    timeout = 600
    on-timeout = /home/ben/.local/bin/hypr-on-battery loginctl lock-session
}

listener {
    timeout = 900
    # macOS-style: ease the panel down to ~1% over ~1.6s, then cut it (dpms).
    # `fade` deliberately does NOT save state — the 300s `dim` already saved the
    # original level, and its on-resume `restore` fades back up to it on wake.
    on-timeout = /home/ben/.local/bin/hypr-on-battery sh -c '/home/ben/dotfiles/scripts/hypr-brightness-fade.sh fade 1 1.6; hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on; pkill -RTMIN+8 waybar; pkill -RTMIN+9 waybar
}

# Keyboard backlight: save current level + switch off on idle, restore on wake.
# Unconditional (AC and battery) — an idle backlit keyboard with nobody at it
# is wasted light/power. brightnessctl -s saves the level, -r restores it.
listener {
    timeout = 300
    on-timeout = brightnessctl -sd kbd_backlight set 0
    on-resume  = brightnessctl -rd kbd_backlight
}
