# Fedora Asahi Remix / Hyprland defaults.
# Apple Silicon video decode is still WIP, so keep decode on the CPU and use
# the GPU for presentation, scaling, and color work.
vo=gpu-next
gpu-api=vulkan
gpu-context=waylandvk
profile=gpu-hq
hwdec=no
ao=pipewire

# Prefer smooth frame pacing on Wayland.
video-sync=display-resample
interpolation=yes
tscale=oversample

# Remember position and practical per-file state.
save-position-on-quit=yes
resume-playback=yes
watch-later-options=start,vid,aid,sid,sub-delay,audio-delay,speed,edition,pause

# Sensible language and subtitle behavior.
alang=eng,en
slang=eng,en
sub-auto=fuzzy
audio-file-auto=fuzzy

# Better defaults for network/video URLs handled through yt-dlp.
ytdl=yes
ytdl-format=bestvideo[height<=?2160]+bestaudio/best

# Keep the on-screen controls readable without being noisy.
osd-bar=yes
osd-duration=1500
