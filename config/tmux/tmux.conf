# ── terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-features ",ghostty:RGB,xterm-256color:RGB"
set -g default-shell /usr/bin/zsh
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000
set -g mouse on
set -sg repeat-time 200
set -g set-clipboard on

# ── prefix ────────────────────────────────────────────────────────────────────
# Ctrl-Space — single-handed, no conflict with vim/readline.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── reload ────────────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message " config reloaded"

# ── splits & windows ──────────────────────────────────────────────────────────
# Intuitive split keys, keep cwd.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# 1-indexed, renumber on close.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize, repeatable.
bind -r H resize-pane -L 4
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 4

# Window switching: Alt+number, no prefix (matches Hyprland workspace muscle memory).
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-h previous-window
bind -n M-l next-window

# ── copy mode (vi) ────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
bind ] paste-buffer -p

# ── activity ──────────────────────────────────────────────────────────────────
set -g monitor-activity on
set -g visual-activity off
set -g bell-action none

# ── status bar ────────────────────────────────────────────────────────────────
# Powerline glass bar — makes the tmux session obvious at a glance. Wedges and
# icon are Nerd Font glyphs ( = U+E0B0,  = U+E0B2,  = terminal U+F120),
# which ghostty renders natively. No CPU/clock — waybar has those.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#0a0e18,fg=#9aa3b6"

set -g status-left-length 60
set -g status-right-length 60

# Left: bold purple session badge, then a powerline wedge back into the bar.
set -g status-left "#[fg=#0a0e18,bg=#c084f5,bold]   #S #[fg=#c084f5,bg=#0a0e18,nobold] "

# Right: prefix flag (lit while C-Space is held) + hostname in a grey segment.
set -g status-right "#[fg=#3a4256]#[fg=#dfe4f0,bg=#3a4256] #{?client_prefix,⌘ PREFIX · ,}#H #[default]"

# Windows: active window is a filled cyan powerline pill; others faint + plain.
set -g window-status-separator " "
set -g window-status-format         "#[fg=#5b6478] #I·#W #{?window_zoomed_flag, ,}"
set -g window-status-current-format "#[fg=#33ccff]#[fg=#0a0e18,bg=#33ccff,bold] #I·#W #{?window_zoomed_flag, ,}#[fg=#33ccff,bg=#0a0e18,nobold]"
set -g window-status-activity-style "fg=#33ccff,none"

# Panes: thin lines, no headers.
set -g pane-border-style "fg=#1f2535"
set -g pane-active-border-style "fg=#7a5aa8"
set -g pane-border-lines single
set -g pane-border-status off

# Messages.
set -g message-style "bg=#0a0e18,fg=#f4f7fb"
set -g message-command-style "bg=#0a0e18,fg=#33ccff"

# Mode (copy-mode selection).
set -g mode-style "bg=#3a2655,fg=#f4f7fb"

# ── misc ──────────────────────────────────────────────────────────────────────
# Don't auto-rename windows once I've set a name manually.
setw -g automatic-rename on
setw -g allow-rename off

# Faster command sequences for nvim.
set -sa terminal-features ",*:cstyle"
