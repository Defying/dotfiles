<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#ffe2d2" stroke="none">
  <!-- Claude / Anthropic 4-petal burst. Each petal is a teardrop pointing outward;
       4 copies rotated 90°. -->
  <g transform="translate(32 32)">
    <g>
      <path d="M 0 -28 C 7 -16 7 -8 0 0 C -7 -8 -7 -16 0 -28 Z" transform="rotate(0)"/>
      <path d="M 0 -28 C 7 -16 7 -8 0 0 C -7 -8 -7 -16 0 -28 Z" transform="rotate(90)"/>
      <path d="M 0 -28 C 7 -16 7 -8 0 0 C -7 -8 -7 -16 0 -28 Z" transform="rotate(180)"/>
      <path d="M 0 -28 C 7 -16 7 -8 0 0 C -7 -8 -7 -16 0 -28 Z" transform="rotate(270)"/>
    </g>
  </g>
</svg>
